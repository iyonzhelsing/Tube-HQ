name: Auto Repair Version and Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Auto Restructure Files
        run: |
          echo "Memulai perbaikan struktur folder Flutter secara otomatis..."
          mkdir -p lib
          mkdir -p android/app/src/main
          
          if [ -f "main.dart" ]; then
            mv main.dart lib/main.dart
            echo "✓ Berhasil memindahkan main.dart ke folder lib/"
          fi
          
          if [ -f "pubspec.yml" ]; then
            mv pubspec.yml pubspec.yaml
            echo "✓ Berhasil mengubah pubspec.yml menjadi pubspec.yaml"
          elif [ -f "pubspec.yaml" ]; then
            echo "✓ File pubspec.yaml sudah aman"
          fi
          
          if [ -f "AndroidManifest.xml" ]; then
            mv AndroidManifest.xml android/app/src/main/AndroidManifest.xml
            echo "✓ Berhasil memindahkan AndroidManifest.xml"
          fi
          
          if [ -f "Build.gradle" ]; then
            cp Build.gradle android/build.gradle
            mv Build.gradle android/app/build.gradle
            echo "✓ Berhasil menempatkan Build.gradle ke konfigurasi"
          fi

      - name: Auto Fix Orientation Package Version Error
        run: |
          echo "Memperbaiki versi package orientation yang salah ketik..."
          # Perintah di bawah ini otomatis mengganti versi ^3.0.0 menjadi ^1.3.0 di pubspec.yaml agar tidak error
          sed -i 's/orientation: ^3.0.0/orientation: ^1.3.0/g' pubspec.yaml
          echo "✓ Perbaikan versi selesai!"

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Project Dependencies
        run: flutter pub get

      - name: Build Application APK
        run: flutter build apk --release

      - name: Save and Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Tube-HQ-Release
          path: build/app/outputs/flutter-apk/app-release.apk
            echo "✓ Berhasil memindahkan AndroidManifest.xml"
          fi
          
          if [ -f "Build.gradle" ]; then
            cp Build.gradle android/build.gradle
            mv Build.gradle android/app/build.gradle
            echo "✓ Berhasil menempatkan Build.gradle ke konfigurasi"
          fi

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Project Dependencies
        run: flutter pub get

      - name: Build Application APK
        run: flutter build apk --release

      - name: Save and Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Tube-HQ-Release
          path: build/app/outputs/flutter-apk/app-release.apk
