name: Auto Fix Structure and Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Memungkinkan Anda menjalankan build secara manual jika mau

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Auto Restructure Files
        run: |
          echo "Memulai perbaikan struktur folder Flutter secara otomatis..."
          
          # 1. Membuat folder standar Flutter yang dibutuhkan
          mkdir -p lib
          mkdir -p android/app/src/main
          
          # 2. Memindahkan file main.dart ke dalam folder lib
          if [ -f "main.dart" ]; then
            mv main.dart lib/main.dart
            echo "✓ Berhasil memindahkan main.dart ke folder lib/"
          fi
          
          # 3. Mengubah nama pubspec.yml menjadi pubspec.yaml jika salah ekstensi
          if [ -f "pubspec.yml" ]; then
            mv pubspec.yml pubspec.yaml
            echo "✓ Berhasil mengubah pubspec.yml menjadi pubspec.yaml"
          elif [ -f "pubspec.yaml" ]; then
            echo "✓ File pubspec.yaml sudah berada di posisi yang benar"
          fi
          
          # 4. Merapikan struktur file Android Native
          if [ -f "AndroidManifest.xml" ]; then
            mv AndroidManifest.xml android/app/src/main/AndroidManifest.xml
            echo "✓ Berhasil memindahkan AndroidManifest.xml"
          fi
          
          if [ -f "Build.gradle" ]; then
            # Mencadangkan ke root folder android dan folder app android demi keamanan sistem build
            cp Build.gradle android/build.gradle
            mv Build.gradle android/app/build.gradle
            echo "✓ Berhasil menempatkan Build.gradle ke konfigurasi sistem"
          fi

      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Project Dependencies
        run: flutter pub get

      - name: Build Application APK
        run: flutter build apk --release

      - name: Save and Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Tube-HQ-Release
          path: build/app/outputs/flutter-apk/app-release.apk
