name: tube_pro
description: YouTube-like offline media player with MX Player features.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  video_player: ^2.9.1
  chewie: ^1.8.5
  provider: ^6.1.2
  file_picker: ^8.0.6
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  video_thumbnail: ^0.5.3
  shared_preferences: ^2.3.2
  screen_brightness: ^0.2.2
  orientation: ^3.0.0
  wakelock_plus: ^1.0.0
  intl: ^0.19.0
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true